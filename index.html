<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะอุปกรณ์ IoT - Real-time Dashboard</title>
    <!-- ใช้ MQTT.js เวอร์ชันล่าสุด -->
    <script src="https://unpkg.com/mqtt@5.0.0/dist/mqtt.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
        }
        .status-led {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        .status-on { background-color: #4CAF50; box-shadow: 0 0 10px #4CAF50; }
        .status-off { background-color: #f44336; box-shadow: 0 0 10px #f44336; }
        .temperature {
            font-size: 3em;
            font-weight: bold;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }
        .online { color: #4CAF50; font-weight: bold; }
        .offline { color: #f44336; }
        .message-log {
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.9em;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
        }
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-family: monospace;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        input {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>
<body>
    <h1>📡 สถานะอุปกรณ์ IoT (Real-time)</h1>
    
    <div class="card">
        <h2>🔌 สถานะการเชื่อมต่อ MQTT</h2>
        <div id="mqttStatus">🔄 กำลังเชื่อมต่อกับ HiveMQ...</div>
        <div id="connectionInfo" style="font-size: 0.8em; margin-top: 10px;"></div>
    </div>
    
    <div class="card">
        <h2>💡 ไฟ LED (GPIO2)</h2>
        <div id="ledStatus">
            <span class="status-led status-off"></span>
            <span id="ledText">รอข้อมูล...</span>
        </div>
    </div>
    
    <div class="card">
        <h2>🌡️ อุณหภูมิ</h2>
        <div class="temperature" id="temperature">--</div>
        <div>°C</div>
    </div>
    
    <div class="card">
        <h2>📊 ข้อมูลล่าสุด</h2>
        <div id="lastUpdate">รอข้อมูล...</div>
        <div id="rawData" style="font-family: monospace; font-size: 0.8em; margin-top: 10px;"></div>
    </div>
    
    <div class="card">
        <h2>📝 ประวัติข้อความที่ได้รับ</h2>
        <div class="message-log" id="messageLog">
            <div class="log-entry">⏳ รอรับข้อมูล...</div>
        </div>
        <button onclick="clearLog()">ล้างประวัติ</button>
    </div>

    <script>
        let messages = [];
        let currentData = { led: 0, temperature: 0 };
        
        // URL สำหรับ HiveMQ WebSocket (ลองหลายๆ URL)
        // URL ที่ถูกต้องสำหรับ HiveMQ Public Broker
        const brokerUrl = "wss://broker.hivemq.com:8884/mqtt";
        // URL สำรอง (ถ้าอันแรกไม่เวิร์ค)
        // const brokerUrl2 = "wss://mqtt.eclipseprojects.io:443/mqtt";
        
        const clientId = "web_dashboard_" + Math.random().toString(36).substr(2, 10);
        const topic = "sumett/status";
        
        console.log("กำลังเชื่อมต่อกับ:", brokerUrl);
        console.log("Client ID:", clientId);
        
        // สร้าง MQTT client
        const client = mqtt.connect(brokerUrl, {
            clientId: clientId,
            clean: true,
            connectTimeout: 4000,
            reconnectPeriod: 1000,
            username: '',
            password: ''
        });
        
        client.on('connect', () => {
            console.log("✅ เชื่อมต่อ MQTT สำเร็จ!");
            document.getElementById('mqttStatus').innerHTML = '<span class="online">✅ เชื่อมต่อแล้ว กำลังรับข้อมูล...</span>';
            document.getElementById('connectionInfo').innerHTML = `Client ID: ${clientId} | Broker: ${brokerUrl}`;
            
            // Subscribe topic
            client.subscribe(topic, { qos: 0 }, (err) => {
                if (!err) {
                    console.log(`✅ Subscribe to ${topic} สำเร็จ`);
                    addLog(`✅ Subscribe to ${topic} สำเร็จ`, 'success');
                } else {
                    console.error("Subscribe error:", err);
                    addLog(`❌ Subscribe error: ${err}`, 'error');
                }
            });
        });
        
        client.on('message', (topic, message) => {
            const messageStr = message.toString();
            console.log(`📨 Received on ${topic}:`, messageStr);
            
            addLog(`📨 ${new Date().toLocaleTimeString()} - ${topic}: ${messageStr}`, 'data');
            
            try {
                const data = JSON.parse(messageStr);
                currentData = data;
                updateUI(data);
            } catch(e) {
                console.error("JSON parse error:", e);
                document.getElementById('rawData').innerHTML = `Raw: ${messageStr}`;
            }
        });
        
        client.on('error', (err) => {
            console.error("❌ MQTT Error:", err);
            document.getElementById('mqttStatus').innerHTML = `<span class="offline">❌ Error: ${err.message}</span>`;
            addLog(`❌ Error: ${err.message}`, 'error');
        });
        
        client.on('reconnect', () => {
            console.log("🔄 กำลัง reconnect...");
            document.getElementById('mqttStatus').innerHTML = '<span class="offline">🔄 กำลัง reconnect...</span>';
            addLog('🔄 กำลัง reconnect...', 'info');
        });
        
        client.on('offline', () => {
            console.log("📴 ออฟไลน์");
            document.getElementById('mqttStatus').innerHTML = '<span class="offline">📴 ออฟไลน์</span>';
            addLog('📴 ออฟไลน์', 'info');
        });
        
        function updateUI(data) {
            // อัปเดตสถานะ LED
            const ledDiv = document.getElementById('ledStatus');
            const ledStatus = data.led === 1 ? 'on' : 'off';
            ledDiv.innerHTML = `
                <span class="status-led status-${ledStatus}"></span>
                <span id="ledText">${data.led === 1 ? '✅ เปิดอยู่' : '❌ ปิดอยู่'}</span>
            `;
            
            // อัปเดตอุณหภูมิ
            if (data.temperature) {
                document.getElementById('temperature').innerHTML = data.temperature;
                // เปลี่ยนสีตามอุณหภูมิ
                const tempElem = document.getElementById('temperature');
                if (data.temperature > 30) {
                    tempElem.style.color = '#ff6b6b';
                } else if (data.temperature < 20) {
                    tempElem.style.color = '#4ecdc4';
                } else {
                    tempElem.style.color = 'white';
                }
            }
            
            // อัปเดตเวลาล่าสุด
            const now = new Date();
            document.getElementById('lastUpdate').innerHTML = `อัปเดตล่าสุด: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
            document.getElementById('rawData').innerHTML = `Raw JSON: ${JSON.stringify(data, null, 2)}`;
        }
        
        function addLog(message, type = 'data') {
            const logDiv = document.getElementById('messageLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let color = '';
            if (type === 'error') color = '#ff6b6b';
            else if (type === 'success') color = '#4CAF50';
            else if (type === 'info') color = '#4ecdc4';
            else color = 'white';
            
            entry.style.color = color;
            entry.innerHTML = message;
            
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            // เก็บแค่ 50 ข้อความล่าสุด
            while (logDiv.children.length > 50) {
                logDiv.removeChild(logDiv.firstChild);
            }
        }
        
        function clearLog() {
            const logDiv = document.getElementById('messageLog');
            logDiv.innerHTML = '<div class="log-entry">🗑️ ล้างประวัติแล้ว</div>';
        }
        
        // แสดงเวลาเชื่อมต่อ
        console.log("✅ Script loaded, connecting to MQTT...");
        addLog('🚀 หน้าเว็บโหลดเสร็จ กำลังเชื่อมต่อ MQTT...', 'info');
    </script>
</body>
</html>
